name: build-assets

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'public/build/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Verify Laravel autoload and Wayfinder command
        run: |
          test -f vendor/autoload.php
          php artisan wayfinder:generate --with-form

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: NODE_ENV=production npm run build

      - name: Publish deploy branch (with built assets)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SOURCE_SHA="$(git rev-parse --short HEAD)"

          # Build artifacts are published to deploy branch, so main stays source-only.
          git checkout -B deploy
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore(ci): deploy build from ${SOURCE_SHA} [skip ci]"
          git push --force-with-lease origin deploy
